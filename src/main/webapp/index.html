<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-box">
    <h2>Anmelden</h2>
    <input class="login-input" id="name" placeholder="Username" type="text">
    <input class="login-input" id="passwort" placeholder="Passwort" type="password">

    <div class="button-group">
        <input class="button-back" id="register" value="Register" type="button">
        <input class="button" id="enter" value="Login" type="button">
    </div>
</div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="script.js"></script>
<script>
    window.addEventListener("load", async() => {
        await getSession();
        document.getElementById("register").addEventListener("click", () => {window.location.href = "register.html";});
        document.getElementById("enter").addEventListener("click", login);
    });
</script>
</html>
